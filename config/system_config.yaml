system:
  name: Auklab Video Inference System
  version: '1.0'
hardware:
  gpus:
    count: 2
    device_ids:
    - 0
    - 1
    workers_per_gpu: 2
  cpus:
    worker_count: 90
paths:
  video_roots:
  - ../../../../../../mnt/BSP_NAS2/Video
  - ../../../../../../mnt/BSP_NAS2_vol3/Video
  - ../../../../../../mnt/BSP_NAS2_vol4/Video
  inference_output: ../../../../../../mnt/BSP_NAS2_work/auklab_model/inference/
  event_analysis_output: ../../../../../../mnt/BSP_NAS2_work/auklab_model/event_data/
  clips_output: ../../../../../../mnt/BSP_NAS2_work/auklab_model/event_data/
  detection_model: models/auklab_yolo26x_seabirdfish_6080_v1.pt
  state_db: data/processing_state.db
  stage3_state_db: data/stage3_processing_state.db
  events_db_root: data/events_db
  log_dir: logs
processing:
  stage1_video_inference:
    frame_skip: 25
    batch_size: 32
    confidence_threshold: 0.25
  stage2_event_detection:
    fps: 1
    original_video_fps: 25
    confidence_threshold: 0.25
    smooth_window_s: 3
    error_window_s: 10
    hold_seconds: 8
    fish_window_s: 5
    movement_smoothing_s: 5
    flap_area_multiplier: 3.0
    flap_baseline_s: 30
  stage3_clip_extraction:
    clip_before: 5
    clip_after: 10
    event_types:
    - arrival
    fish_only: true
    worker_count: 4
    video_extensions:
    - .mkv
    - .mp4
    - .avi
    compression:
      enabled: true
      crf: 28
      preset: fast
  stage4_post_classification:
    worker_count: 4
    min_bird_frames: 8
    min_centroid_displacement: 20.0
    min_mean_motion: 2.0
    min_fish_frames: 3
    fish_early_presence_ratio: 0.15
    use_model: true
    model_path: models/stage4/tri3_fish_arrival_model.json
    model_threshold: 0.49
    rule_version: v2
priorities:
  years:
  - 2025
  - 2024
  - 2023
  - 2022
  - 2021
  - 2020
  - 2019
  stations: [FAR3]
  #- TRI6
  #- TRI3
  #- FAR3
  #- FARALLON3
  #- BONDEN5
  #- FAR6
filters:
  date_range:
    start: '2025-05-01'
    end: '2025-07-10'
  # Stations listed here are completely ignored when discovering videos
  # and building the processing database. Matching is case-insensitive
  # and uses substring logic, so e.g. "TRI" will ignore TRI3, TRI6, etc.
  ignored_stations: [OVERVIEW, TRI1, TRI2, TRI4, TRI5, FAR1, FAR2, FAR4, FAR5, BJORN3TRI3, EAGLE, BJORN, FAR6BONDEN6, TLZOOM, ROST3SIDE, EJDER, SCALE, TOMS, FAR3_2, BONDEN8, BJORN8, BJORN7, IOM5, TRI7, IOM4, BONDEN7, FAR8, TRI7, TRI8, TRI9, TLOVER, SEAL, CAMERA, '2022', FAR3SIDE, FAR3_CUTE, TORDMULE3, BONDEN1, BONDEN2, BONDEN3, BONDEN4, CUTE, A1, GROTTAN]
error_handling:
  max_retries: 2
  retry_delay_seconds: 60
  skip_on_persistent_failure: true
monitoring:
  update_interval_seconds: 60
  log_performance_metrics: true
resume:
  enabled: true
  checkpoint_interval_seconds: 300
